<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
new Chart(document.getElementById('segmentDonut'), {
  type: 'doughnut',
  data: {
    labels: ['Returning', 'VIP', 'New', 'Churned'],
    datasets: [{
      data: [42.9, 27.9, 15.0, 14.3],
      backgroundColor: ['#1D9E75', '#378ADD', '#EF9F27', '#E24B4A'],
      borderColor: 'transparent',
      borderWidth: 0,
      hoverOffset: 8
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    cutout: '65%',
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: function(ctx) {
            const counts = [3433, 2229, 1197, 1141];
            return ' ' + ctx.parsed.toFixed(1) + '% — ' + counts[ctx.dataIndex].toLocaleString() + ' customers';
          }
        }
      }
    }
  },
  plugins: [{
    id: 'centerText',
    afterDraw(chart) {
      const { ctx, chartArea: { width, height, left, top } } = chart;
      ctx.save();
      const cx = left + width / 2;
      const cy = top + height / 2;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#1D9E75';
      ctx.font = '500 22px sans-serif';
      ctx.fillText('70.8%', cx, cy - 12);
      ctx.fillStyle = '#888780';
      ctx.font = '400 11px sans-serif';
      ctx.fillText('loyal base', cx, cy + 10);
      ctx.restore();
    }
  }]
});
</script>
